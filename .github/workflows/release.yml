name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Package plugin
        run: |
          mkdir -p hercules-codes/dist
          cp -r dist/. hercules-codes/dist/
          cp main.py plugin.json package.json LICENSE README.md hercules-codes/
          zip -r hercules-codes.zip hercules-codes/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hercules-codes.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}